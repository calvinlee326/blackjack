<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-box">
            <div class="welcome-suits">♠ ♥ ♦ ♣</div>
            <h2>BLACKJACK</h2>
            <p class="welcome-sub">Enter your name to play</p>
            <input type="text" id="name-input" placeholder="Your name..." maxlength="20"
                   onkeydown="if(event.key==='Enter') startSession()">
            <button class="btn-enter" onclick="startSession()">ENTER CASINO</button>
        </div>
    </div>

    <!-- Game -->
    <div id="game-container" class="hidden">
        <div class="casino-header">
            <h1>♠ BLACKJACK ♥</h1>
            <p class="tagline">DEALER MUST STAND ON 17</p>
        </div>

        <div class="info-bar">
            <div class="info-item">
                <span class="info-label">PLAYER</span>
                <span id="player-name-el" class="info-value">—</span>
            </div>
            <div class="info-item">
                <span class="info-label">CREDITS</span>
                <span id="credits-el" class="info-value gold">1000</span>
            </div>
        </div>

        <div class="table">
            <p class="table-label">BLACKJACK PAYS 3 TO 2</p>

            <div class="dealer-section">
                <p class="section-label">DEALER</p>
                <div id="dealer-cards-el" class="cards-area"></div>
                <div class="score-box">Total: <span id="dealer-sum-el">—</span></div>
            </div>

            <div id="message-el" class="message">Place your bet and deal!</div>

            <div class="player-section">
                <p class="section-label">YOUR HAND</p>
                <div id="cards-el" class="cards-area"></div>
                <div class="score-box">Total: <span id="sum-el">—</span></div>
            </div>
        </div>

        <div class="bet-area">
            <span class="bet-label">BET</span>
            <input type="number" id="bet-input" min="1" value="10">
            <button class="btn-deal" id="btn-deal" onclick="startGame()">DEAL</button>
        </div>

        <div class="actions">
            <button class="btn-hit" id="btn-hit" onclick="hit()" disabled>HIT</button>
            <button class="btn-stand" id="btn-stand" onclick="stand()" disabled>STAND</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
